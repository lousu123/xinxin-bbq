<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>欣欣炭火烧烤 · 开业全案营销方案</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700;900&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --charcoal: #1a1a1a;
  --charcoal-light: #2d2d2d;
  --fire: #d4561e;
  --fire-glow: #ff6b35;
  --amber: #f0b429;
  --amber-light: #ffd166;
  --cream: #fff5ee;
  --cream-dark: #f5e6d3;
  --smoke: #888;
  --text: #f0e6d8;
  --text-dim: #a09080;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Noto Sans SC', sans-serif;
  background: var(--charcoal);
  color: var(--text);
  overflow-x: hidden;
  line-height: 1.8;
}

/* ===== 粒子背景 ===== */
#particles-canvas {
  position: fixed;
  top: 0; left: 0;
  width: 100%; height: 100%;
  z-index: 0;
  pointer-events: none;
}

/* ===== 导航 ===== */
.nav-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  z-index: 100;
  background: rgba(26,26,26,0.9);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid rgba(212,86,30,0.2);
  padding: 0 24px;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  transition: transform 0.3s;
}
.nav-bar.hidden { transform: translateY(-100%); }
.nav-logo {
  font-family: 'Noto Serif SC', serif;
  font-weight: 700;
  font-size: 18px;
  color: var(--fire);
}
.nav-logo span { color: var(--amber); }
.nav-links { display: flex; gap: 8px; flex-wrap: wrap; }
.nav-links a {
  color: var(--text-dim);
  text-decoration: none;
  font-size: 12px;
  padding: 4px 10px;
  border-radius: 4px;
  transition: all 0.3s;
}
.nav-links a:hover { color: var(--amber); background: rgba(212,86,30,0.15); }

/* ===== Hero ===== */
.hero {
  position: relative;
  z-index: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 120px 24px 80px;
}
.hero::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: radial-gradient(ellipse at 50% 80%, rgba(212,86,30,0.15) 0%, transparent 60%),
              radial-gradient(ellipse at 50% 20%, rgba(240,180,41,0.08) 0%, transparent 40%);
  pointer-events: none;
}
.hero-badge {
  display: inline-block;
  padding: 6px 20px;
  border: 1px solid var(--fire);
  border-radius: 20px;
  font-size: 13px;
  color: var(--fire-glow);
  letter-spacing: 3px;
  margin-bottom: 24px;
  animation: fadeInUp 0.8s ease;
}
.hero h1 {
  font-family: 'Noto Serif SC', serif;
  font-size: clamp(48px, 10vw, 96px);
  font-weight: 900;
  color: var(--cream);
  line-height: 1.1;
  margin-bottom: 8px;
  animation: fadeInUp 0.8s ease 0.1s both;
}
.hero h1 .fire-char { color: var(--fire); }
.hero h1 .amber-char { color: var(--amber); }
.hero-subtitle {
  font-size: clamp(18px, 3vw, 28px);
  color: var(--text-dim);
  font-weight: 300;
  letter-spacing: 6px;
  margin-bottom: 40px;
  animation: fadeInUp 0.8s ease 0.2s both;
}
.hero-stats {
  display: flex;
  gap: 48px;
  flex-wrap: wrap;
  justify-content: center;
  animation: fadeInUp 0.8s ease 0.3s both;
}
.hero-stat { text-align: center; }
.hero-stat-num {
  font-family: 'Noto Serif SC', serif;
  font-size: 36px;
  font-weight: 700;
  color: var(--amber);
}
.hero-stat-label {
  font-size: 13px;
  color: var(--text-dim);
  margin-top: 4px;
}
.hero-address {
  margin-top: 32px;
  font-size: 14px;
  color: var(--smoke);
  letter-spacing: 2px;
  animation: fadeInUp 0.8s ease 0.4s both;
}
.hero-cta {
  margin-top: 40px;
  animation: fadeInUp 0.8s ease 0.5s both;
}
.hero-cta a {
  display: inline-block;
  padding: 14px 40px;
  background: linear-gradient(135deg, var(--fire), var(--fire-glow));
  color: #fff;
  text-decoration: none;
  border-radius: 30px;
  font-size: 16px;
  font-weight: 500;
  transition: all 0.3s;
  box-shadow: 0 4px 20px rgba(212,86,30,0.3);
}
.hero-cta a:hover {
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(212,86,30,0.5);
}

/* ===== 火焰装饰线 ===== */
.fire-divider {
  position: relative;
  z-index: 1;
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
}
.fire-divider .line {
  width: 80px;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--fire), transparent);
}
.fire-divider .dot {
  width: 8px;
  height: 8px;
  background: var(--fire);
  border-radius: 50%;
  animation: pulse 2s ease infinite;
}

/* ===== 目录 ===== */
.toc-section {
  position: relative;
  z-index: 1;
  padding: 60px 24px;
  max-width: 900px;
  margin: 0 auto;
}
.toc-title {
  text-align: center;
  font-family: 'Noto Serif SC', serif;
  font-size: 32px;
  color: var(--cream);
  margin-bottom: 8px;
}
.toc-subtitle {
  text-align: center;
  color: var(--text-dim);
  font-size: 14px;
  margin-bottom: 40px;
}
.toc-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 12px;
}
.toc-btn {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 16px 20px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  cursor: pointer;
  transition: all 0.3s;
  text-align: left;
  color: var(--text);
  font-size: 14px;
  font-family: 'Noto Sans SC', sans-serif;
}
.toc-btn:hover {
  background: rgba(212,86,30,0.1);
  border-color: var(--fire);
  transform: translateY(-2px);
}
.toc-btn .num {
  font-family: 'Noto Serif SC', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--fire);
  min-width: 32px;
}
.toc-btn .label { flex: 1; }
.toc-btn .arrow { color: var(--fire); font-size: 18px; transition: transform 0.3s; }
.toc-btn:hover .arrow { transform: translateX(4px); }

/* ===== 内容区 ===== */
.content-section {
  position: relative;
  z-index: 1;
  max-width: 900px;
  margin: 0 auto;
  padding: 0 24px 80px;
}
.chapter {
  margin-bottom: 60px;
  opacity: 0;
  transform: translateY(30px);
  transition: all 0.6s ease;
}
.chapter.visible { opacity: 1; transform: translateY(0); }
.chapter-header {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 24px;
  padding-bottom: 16px;
  border-bottom: 1px solid rgba(212,86,30,0.2);
}
.chapter-num {
  font-family: 'Noto Serif SC', serif;
  font-size: 42px;
  font-weight: 900;
  color: var(--fire);
  line-height: 1;
  opacity: 0.6;
}
.chapter-title {
  font-family: 'Noto Serif SC', serif;
  font-size: 24px;
  color: var(--cream);
}
.chapter p {
  color: var(--text);
  font-size: 15px;
  line-height: 1.9;
  margin-bottom: 12px;
}
.chapter p.dim { color: var(--text-dim); font-size: 14px; }

/* ===== 数据卡片 ===== */
.data-cards {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 16px;
  margin: 20px 0;
}
.data-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  padding: 20px;
  text-align: center;
}
.data-card .val {
  font-family: 'Noto Serif SC', serif;
  font-size: 28px;
  font-weight: 700;
  color: var(--amber);
}
.data-card .lbl {
  font-size: 13px;
  color: var(--text-dim);
  margin-top: 4px;
}

/* ===== 表格 ===== */
.chapter-table {
  width: 100%;
  border-collapse: collapse;
  margin: 16px 0;
  font-size: 14px;
}
.chapter-table th {
  background: rgba(212,86,30,0.2);
  color: var(--amber);
  padding: 10px 14px;
  text-align: left;
  font-weight: 500;
  border-bottom: 2px solid var(--fire);
}
.chapter-table td {
  padding: 10px 14px;
  border-bottom: 1px solid rgba(255,255,255,0.05);
  color: var(--text);
}
.chapter-table tr:hover td { background: rgba(255,255,255,0.02); }

/* ===== 活动卡片 ===== */
.activity-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
  margin: 20px 0;
}
.activity-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(255,255,255,0.06);
  border-radius: 12px;
  padding: 24px;
  position: relative;
  overflow: hidden;
}
.activity-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px;
  height: 100%;
  background: linear-gradient(180deg, var(--fire), var(--amber));
}
.activity-card .tag {
  display: inline-block;
  padding: 2px 10px;
  background: rgba(212,86,30,0.2);
  color: var(--fire-glow);
  border-radius: 4px;
  font-size: 12px;
  font-weight: 500;
  margin-bottom: 8px;
}
.activity-card h4 {
  font-size: 16px;
  color: var(--cream);
  margin-bottom: 8px;
}
.activity-card p {
  font-size: 13px !important;
  color: var(--text-dim) !important;
  margin-bottom: 4px !important;
}

/* ===== 预算高亮 ===== */
.budget-highlight {
  background: linear-gradient(135deg, rgba(212,86,30,0.15), rgba(240,180,41,0.1));
  border: 1px solid rgba(212,86,30,0.3);
  border-radius: 16px;
  padding: 32px;
  text-align: center;
  margin: 20px 0;
}
.budget-highlight .amount {
  font-family: 'Noto Serif SC', serif;
  font-size: 48px;
  font-weight: 900;
  color: var(--amber);
}
.budget-highlight .note {
  color: var(--text-dim);
  font-size: 14px;
  margin-top: 8px;
}

/* ===== KPI 进度条 ===== */
.kpi-bar-wrap { margin: 12px 0; }
.kpi-bar-label {
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  margin-bottom: 4px;
}
.kpi-bar-label .name { color: var(--text); }
.kpi-bar-label .val { color: var(--amber); font-weight: 500; }
.kpi-bar {
  height: 6px;
  background: rgba(255,255,255,0.06);
  border-radius: 3px;
  overflow: hidden;
}
.kpi-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--fire), var(--amber));
  border-radius: 3px;
  transition: width 1s ease;
}

/* ===== 底部 ===== */
.footer {
  position: relative;
  z-index: 1;
  text-align: center;
  padding: 60px 24px;
  border-top: 1px solid rgba(255,255,255,0.05);
}
.footer .brand {
  font-family: 'Noto Serif SC', serif;
  font-size: 20px;
  color: var(--fire);
  margin-bottom: 8px;
}
.footer .credit {
  color: var(--text-dim);
  font-size: 13px;
}

/* ===== 动画 ===== */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {
  0%, 100% { opacity: 0.4; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.3); }
}
@keyframes float {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}
@keyframes ember {
  0% { opacity: 0; transform: translateY(0) scale(0); }
  20% { opacity: 1; }
  80% { opacity: 0.6; }
  100% { opacity: 0; transform: translateY(-120px) scale(0.3); }
}

/* ===== 响应式 ===== */
@media (max-width: 640px) {
  .hero-stats { gap: 24px; }
  .toc-grid { grid-template-columns: 1fr; }
  .data-cards { grid-template-columns: 1fr 1fr; }
  .activity-grid { grid-template-columns: 1fr; }
  .nav-links { display: none; }
}
</style>
</head>
<body>

<canvas id="particles-canvas"></canvas>

<!-- 导航 -->
<nav class="nav-bar" id="navBar">
  <div class="nav-logo">欣欣<span>炭火</span>烧烤</div>
  <div class="nav-links" id="navLinks"></div>
</nav>

<!-- Hero -->
<section class="hero">
  <div class="hero-badge">✦ 专业餐饮开业方案 ✦</div>
  <h1>
    <span class="fire-char">欣欣</span><span class="amber-char">炭火</span><span class="fire-char">烧烤</span>
  </h1>
  <div class="hero-subtitle">开业全案营销方案</div>
  <div class="hero-stats">
    <div class="hero-stat">
      <div class="hero-stat-num">40</div>
      <div class="hero-stat-label">目标人均（元）</div>
    </div>
    <div class="hero-stat">
      <div class="hero-stat-num">3</div>
      <div class="hero-stat-label">周边竞品</div>
    </div>
    <div class="hero-stat">
      <div class="hero-stat-num">120</div>
      <div class="hero-stat-label">门店面积（㎡）</div>
    </div>
    <div class="hero-stat">
      <div class="hero-stat-num">80</div>
      <div class="hero-stat-label">二楼室内（㎡）</div>
    </div>
  </div>
  <div class="hero-address">📍 天津塘沽海洋科技园 · 工农村菜市场旁</div>
  <div class="hero-cta">
    <a href="#toc">🔥 查看完整方案</a>
  </div>
</section>

<!-- 火焰装饰 -->
<div class="fire-divider">
  <span class="line"></span>
  <span class="dot"></span>
  <span class="line"></span>
</div>

<!-- 目录 -->
<section class="toc-section" id="toc">
  <h2 class="toc-title">全案营销方案目录</h2>
  <p class="toc-subtitle">点击任意章节可直接跳转</p>
  <div class="toc-grid" id="tocGrid"></div>
</section>

<!-- 内容 -->
<section class="content-section" id="content"></section>

<!-- 底部 -->
<footer class="footer">
  <div class="brand">欣欣炭火烧烤</div>
  <p class="credit">编制：娄苏 | 美团SAAS &nbsp;·&nbsp; 2026年5月</p>
</footer>

<script>
// ===== 粒子系统 =====
const canvas = document.getElementById('particles-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
let embers = [];

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * canvas.width;
    this.y = Math.random() * canvas.height;
    this.size = Math.random() * 2 + 0.5;
    this.speedX = (Math.random() - 0.5) * 0.3;
    this.speedY = -Math.random() * 0.2 - 0.1;
    this.opacity = Math.random() * 0.4 + 0.1;
  }
  update() {
    this.x += this.speedX;
    this.y += this.speedY;
    if (this.y < -10 || this.x < -10 || this.x > canvas.width + 10) this.reset();
    if (this.y < canvas.height * 0.3) this.y = canvas.height;
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(212, 86, 30, ${this.opacity})`;
    ctx.fill();
  }
}

class Ember {
  constructor() {
    this.x = Math.random() * canvas.width;
    this.y = canvas.height - 20;
    this.size = Math.random() * 3 + 1;
    this.speedY = Math.random() * 1.5 + 0.5;
    this.speedX = (Math.random() - 0.5) * 0.5;
    this.life = 1;
    this.decay = Math.random() * 0.008 + 0.005;
  }
  update() {
    this.y -= this.speedY;
    this.x += this.speedX;
    this.life -= this.decay;
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI * 2);
    const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.size * this.life);
    gradient.addColorStop(0, `rgba(255, 107, 53, ${this.life})`);
    gradient.addColorStop(0.5, `rgba(240, 180, 41, ${this.life * 0.6})`);
    gradient.addColorStop(1, `rgba(212, 86, 30, 0)`);
    ctx.fillStyle = gradient;
    ctx.fill();
  }
}

function spawnEmber() {
  if (Math.random() < 0.15) {
    embers.push(new Ember());
  }
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => { p.update(); p.draw(); });
  spawnEmber();
  embers.forEach(e => { e.update(); e.draw(); });
  embers = embers.filter(e => e.life > 0);
  if (embers.length > 60) embers.splice(0, embers.length - 60);
  requestAnimationFrame(animateParticles);
}

for (let i = 0; i < 80; i++) particles.push(new Particle());
animateParticles();

// ===== 章节数据 =====
const chapters = [
  { num: '01', title: '背景概述', subtitle: '门店信息 · 定位 · 核心目标',
    content: `
      <p>欣欣炭火烧烤位于<strong>天津塘沽海洋科技园</strong>，工农村小学附近、工农村菜市场旁，周边以社区居民和产业园区上班族为主。</p>
      <p>门店一楼为操作间+外摆区域，二楼约80㎡室内用餐区，总面积约120㎡（含外摆）。主营<strong>炭火烧烤</strong>，夏季为旺季，人均消费约<strong>40元</strong>，采用扫码点餐模式。目前处于装修阶段，尚未开业。</p>
      <div class="data-cards">
        <div class="data-card"><div class="val">120㎡</div><div class="lbl">总面积（含外摆）</div></div>
        <div class="data-card"><div class="val">40元</div><div class="lbl">人均消费</div></div>
        <div class="data-card"><div class="val">80㎡</div><div class="lbl">二楼室内</div></div>
        <div class="data-card"><div class="val">炭火</div><div class="lbl">烧烤工艺</div></div>
      </div>
      <p class="dim">核心目标：通过DM引流+团购引流+私域沉淀+开业活动+烧烤专项，实现开业火爆、持续复购。</p>
    ` },
  { num: '02', title: '整体策略框架', subtitle: '四管齐下开业活动体系',
    content: `
      <p>采用<strong>四管齐下</strong>策略体系，全方位覆盖引流、沉淀、转化、复购全链路：</p>
      <table class="chapter-table">
        <tr><th>策略</th><th>目的</th><th>载体</th><th>核心内容</th></tr>
        <tr><td>大众点评团购</td><td>引流+提升曝光</td><td>DM单二维码①</td><td>19.9元双人烧烤套餐（前3天限量）</td></tr>
        <tr><td>扫码领券私域</td><td>沉淀手机号+微信群</td><td>DM单二维码②</td><td>5元券（满30元可用）</td></tr>
        <tr><td>开业现场活动</td><td>提升客单价+锁定复购</td><td>收银系统</td><td>第二份半价+满减赠券+发圈送菜</td></tr>
        <tr><td>烧烤专项活动</td><td>带动尝鲜+长期复购</td><td>DM单+收银+微信群</td><td>三大活动A/B/C同步落地</td></tr>
      </table>
    ` },
  { num: '03', title: 'DM单版面设计', subtitle: 'A5双面 · 双二维码 · 烧烤优惠栏',
    content: `
      <p><strong>规格：</strong>A5（148mm × 210mm），双面彩印，128g铜版纸</p>

// ===== 渲染 =====
const tocGrid = document.getElementById('tocGrid');
const content = document.getElementById('content');
const navLinks = document.getElementById('navLinks');

chapters.forEach((ch, i) => {
  // 目录按钮
  const btn = document.createElement('button');
  btn.className = 'toc-btn';
  btn.innerHTML = `<span class="num">${ch.num}</span><span class="label">${ch.title}</span><span class="arrow">→</span>`;
  btn.addEventListener('click', () => {
    document.getElementById(`ch-${i}`).scrollIntoView({ behavior: 'smooth' });
  });
  tocGrid.appendChild(btn);

  // 导航链接
  const link = document.createElement('a');
  link.href = `#ch-${i}`;
  link.textContent = ch.num;
  link.title = ch.title;
  navLinks.appendChild(link);

  // 内容章节
  const div = document.createElement('div');
  div.className = 'chapter';
  div.id = `ch-${i}`;
  div.innerHTML = `
    <div class="chapter-header">
      <span class="chapter-num">${ch.num}</span>
      <div>
        <div class="chapter-title">${ch.title}</div>
        <div style="font-size:13px;color:var(--text-dim);margin-top:4px">${ch.subtitle}</div>
      </div>
    </div>
    ${ch.content}
  `;
  content.appendChild(div);
});

// ===== 滚动动画 =====
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
    }
  });
}, { threshold: 0.1 });

document.querySelectorAll('.chapter').forEach(el => observer.observe(el));

// ===== 导航栏显隐 =====
let lastScroll = 0;
window.addEventListener('scroll', () => {
  const current = window.scrollY;
  const nav = document.getElementById('navBar');
  if (current > 200) {
    nav.classList.toggle('hidden', current > lastScroll && current > 400);
  } else {
    nav.classList.remove('hidden');
  }
  lastScroll = current;
});
</script>
